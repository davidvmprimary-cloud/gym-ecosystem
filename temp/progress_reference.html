<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Progress Tab - Fitness PWA</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'fitness-bg': '#0C0C0C',
                        'fitness-surface': '#141414',
                        'fitness-accent': '#5FA870',
                        'fitness-accent-active': '#3D6B47',
                        'fitness-text-primary': '#F0F0F0',
                        'fitness-text-secondary': '#8A8A8A',
                        'fitness-push': '#4A7FA5',
                        'fitness-pull': '#3D6B47',
                        'fitness-legs': '#8B6B4E',
                        'fitness-rest': '#1A1A1A',
                        'fitness-gold': '#C8922A',
                    }
                }
            }
        }
    </script>
    <style data-purpose="global-styles">
        body {
            background-color: #0C0C0C;
            color: #F0F0F0;
            -webkit-font-smoothing: antialiased;
            width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
    <style data-purpose="chart-styles">
        .area-chart-gradient {
            fill: url(#chartGradient);
        }

        .dashed-trend {
            stroke-dasharray: 4 2;
        }
    </style>
</head>

<body class="font-sans">
    <!-- BEGIN: MainHeader -->
    <header class="p-5 pb-2 sticky top-0 bg-fitness-bg/90 backdrop-blur-md z-50">
        <h1 class="text-[22px] font-bold text-fitness-text-primary">Progreso</h1>
    </header>
    <!-- END: MainHeader -->
    <!-- BEGIN: TimeRangeSelector -->
    <nav class="px-5 mb-6 sticky top-[60px] bg-fitness-bg/90 backdrop-blur-md z-40 py-2">
        <div
            class="bg-fitness-surface p-1 rounded-full flex justify-between items-center text-xs font-medium text-fitness-text-secondary">
            <button class="flex-1 py-1.5 rounded-full text-center">1S</button>
            <button class="flex-1 py-1.5 rounded-full text-center bg-fitness-accent-active text-white">1M</button>
            <button class="flex-1 py-1.5 rounded-full text-center">3M</button>
            <button class="flex-1 py-1.5 rounded-full text-center">6M</button>
            <button class="flex-1 py-1.5 rounded-full text-center">1A</button>
        </div>
    </nav>
    <!-- END: TimeRangeSelector -->
    <main class="px-5 space-y-5 pb-10">
        <!-- BEGIN: Zone1_GlobalVolume -->
        <section class="bg-fitness-surface rounded-2xl p-4" data-purpose="volume-card">
            <header class="flex justify-between items-start mb-1">
                <div>
                    <h2 class="text-[10px] font-bold text-fitness-text-secondary uppercase tracking-widest">VOLUMEN
                        GLOBAL</h2>
                    <div class="text-[36px] font-bold tabular-nums text-fitness-text-primary leading-tight mt-1">
                        48,320<span class="text-sm font-normal ml-1">kg</span></div>
                </div>
                <div class="flex items-center text-fitness-accent text-xs font-semibold mt-2">
                    <i class="w-3 h-3 mr-1" data-lucide="trending-up"></i>
                    +4.6%
                </div>
            </header>
            <!-- Area Chart SVG -->
            <div class="h-[160px] w-full mt-4 relative">
                <svg class="w-full h-full" viewbox="0 0 335 160">
                    <defs>
                        <lineargradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
                            <stop offset="0%" stop-color="#5FA870" stop-opacity="0.3"></stop>
                            <stop offset="100%" stop-color="#5FA870" stop-opacity="0"></stop>
                        </lineargradient>
                    </defs>
                    <!-- Grid Lines (Faint) -->
                    <line stroke="#222" stroke-width="1" x1="0" x2="335" y1="40" y2="40"></line>
                    <line stroke="#222" stroke-width="1" x1="0" x2="335" y1="80" y2="80"></line>
                    <line stroke="#222" stroke-width="1" x1="0" x2="335" y1="120" y2="120"></line>
                    <!-- Gradient Area -->
                    <path class="area-chart-gradient"
                        d="M0 140 Q 40 120, 80 130 T 160 80 T 240 60 T 335 30 V 160 H 0 Z"></path>
                    <!-- Smooth Line -->
                    <path d="M0 140 Q 40 120, 80 130 T 160 80 T 240 60 T 335 30" fill="none" stroke="#5FA870"
                        stroke-width="2.5"></path>
                    <!-- Dots for Session Types -->
                    <circle cx="80" cy="130" fill="#4A7FA5" r="3"></circle> <!-- Push -->
                    <circle cx="160" cy="80" fill="#3D6B47" r="3"></circle> <!-- Pull -->
                    <circle cx="240" cy="60" fill="#8B6B4E" r="3"></circle> <!-- Legs -->
                    <circle cx="335" cy="30" fill="#5FA870" r="3"></circle> <!-- Current -->
                </svg>
                <!-- X-Axis Labels -->
                <div class="flex justify-between text-[9px] text-fitness-text-secondary mt-2 px-1">
                    <span>1 May</span>
                    <span>8 May</span>
                    <span>15 May</span>
                    <span>22 May</span>
                    <span>29 May</span>
                </div>
            </div>
        </section>
        <!-- END: Zone1_GlobalVolume -->
        <!-- BEGIN: Zone2_Frequency -->
        <section class="bg-fitness-surface rounded-2xl p-4" data-purpose="frequency-card">
            <h2 class="text-[10px] font-bold text-fitness-text-secondary uppercase tracking-widest mb-4">FRECUENCIA</h2>
            <div class="grid grid-cols-7 gap-2 mb-4">
                <!-- Generative loop for 4 weeks could go here; manual for 28 cells -->
                <!-- Week 1 -->
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-pull"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-rest"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-legs"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-rest"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-pull"></div>
                <!-- Week 2 -->
                <div class="w-7 h-7 rounded-[7px] bg-fitness-legs"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-rest"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-pull"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-legs"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-rest"></div>
                <!-- Week 3 -->
                <div class="w-7 h-7 rounded-[7px] bg-fitness-pull"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-legs"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-rest"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-pull"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-rest"></div>
                <!-- Week 4 (Current) -->
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-legs"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-pull"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-legs"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-rest"></div>
                <div class="w-7 h-7 rounded-[7px] bg-fitness-push"></div>
            </div>
            <div class="flex items-center text-xs font-medium text-fitness-text-primary">
                <span>🔥 Racha actual: 5 días</span>
            </div>
        </section>
        <!-- END: Zone2_Frequency -->
        <!-- BEGIN: Zone3_History -->
        <section class="space-y-3" data-purpose="history-section">
            <div class="flex justify-between items-center">
                <h2 class="text-[10px] font-bold text-fitness-text-secondary uppercase tracking-widest">HISTORIAL</h2>
                <button class="text-[10px] text-fitness-accent font-bold uppercase tracking-widest">VER TODO</button>
            </div>
            <!-- Session Card 1 -->
            <div class="bg-fitness-surface h-16 rounded-xl flex items-center px-4 justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-fitness-accent/10 px-2 py-1 rounded-md">
                        <span class="text-[9px] font-bold text-fitness-accent tracking-tighter">[PULL]</span>
                    </div>
                    <div>
                        <div class="text-xs font-medium text-fitness-text-primary">Mar 14 Jun</div>
                        <div class="text-[10px] text-fitness-text-secondary">48,320 kg</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-fitness-accent tabular-nums">+4.6% ↑</div>
                        <i class="w-3.5 h-3.5 text-fitness-gold ml-auto mt-0.5" data-lucide="trophy"></i>
                    </div>
                    <i class="w-4 h-4 text-fitness-text-secondary" data-lucide="chevron-right"></i>
                </div>
            </div>
            <!-- Session Card 2 -->
            <div class="bg-fitness-surface h-16 rounded-xl flex items-center px-4 justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-fitness-push/10 px-2 py-1 rounded-md">
                        <span class="text-[9px] font-bold text-fitness-push tracking-tighter">[PUSH]</span>
                    </div>
                    <div>
                        <div class="text-xs font-medium text-fitness-text-primary">Lun 13 Jun</div>
                        <div class="text-[10px] text-fitness-text-secondary">46,180 kg</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-fitness-accent tabular-nums">+2.1% ↑</div>
                    </div>
                    <i class="w-4 h-4 text-fitness-text-secondary" data-lucide="chevron-right"></i>
                </div>
            </div>
            <!-- Session Card 3 -->
            <div class="bg-fitness-surface h-16 rounded-xl flex items-center px-4 justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-fitness-legs/10 px-2 py-1 rounded-md">
                        <span class="text-[9px] font-bold text-fitness-legs tracking-tighter">[LEGS]</span>
                    </div>
                    <div>
                        <div class="text-xs font-medium text-fitness-text-primary">Sáb 11 Jun</div>
                        <div class="text-[10px] text-fitness-text-secondary">52,400 kg</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-fitness-text-secondary tabular-nums">-0.5% ↓</div>
                    </div>
                    <i class="w-4 h-4 text-fitness-text-secondary" data-lucide="chevron-right"></i>
                </div>
            </div>
        </section>
        <!-- END: Zone3_History -->
        <!-- BEGIN: Zone4_BodyWeight -->
        <section class="bg-fitness-surface rounded-2xl p-4" data-purpose="weight-card">
            <header class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-[10px] font-bold text-fitness-text-secondary uppercase tracking-widest">PESO
                        CORPORAL</h2>
                    <div class="text-2xl font-bold tabular-nums text-fitness-text-primary mt-1">82.4<span
                            class="text-xs font-normal ml-1">kg</span></div>
                </div>
                <i class="w-5 h-5 text-fitness-text-secondary" data-lucide="calendar-days"></i>
            </header>
            <!-- Scatter + Line Chart -->
            <div class="h-[140px] w-full relative">
                <svg class="w-full h-full" viewbox="0 0 335 140">
                    <!-- Trend Line (Dashed) -->
                    <line class="dashed-trend" stroke="#2A3D2E" stroke-width="1.5" x1="10" x2="325" y1="100" y2="40">
                    </line>
                    <!-- Data Points Connector (Straight Lines) -->
                    <path d="M40 110 L 100 95 L 180 100 L 250 65 L 300 50" fill="none" stroke="#5FA870"
                        stroke-width="2"></path>
                    <!-- Dots -->
                    <circle cx="40" cy="110" fill="#5FA870" r="4"></circle>
                    <circle cx="100" cy="95" fill="#5FA870" r="4"></circle>
                    <circle cx="180" cy="100" fill="#5FA870" r="4"></circle>
                    <circle cx="250" cy="65" fill="#5FA870" r="4"></circle>
                    <circle cx="300" cy="50" fill="#5FA870" r="4"></circle>
                    <!-- Labels -->
                    <text fill="#8A8A8A" font-size="8" text-anchor="middle" x="40" y="130">10 Jun</text>
                    <text fill="#8A8A8A" font-size="8" text-anchor="middle" x="300" y="130">HOY</text>
                </svg>
            </div>
        </section>
        <!-- END: Zone4_BodyWeight -->
    </main>
    <!-- BEGIN: Navigation -->
    <footer
        class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[375px] bg-[#0C0C0C]/95 backdrop-blur-md border-t border-white/5 py-4 px-8 flex justify-between items-center z-50">
        <div class="flex flex-col items-center gap-1 text-fitness-text-secondary">
            <i class="w-6 h-6" data-lucide="bar-chart-2"></i>
            <span class="text-[10px]">Entrenar</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-fitness-accent">
            <i class="w-6 h-6" data-lucide="area-chart"></i>
            <span class="text-[10px]">Progreso</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-fitness-text-secondary">
            <i class="w-6 h-6" data-lucide="calendar-days"></i>
            <span class="text-[10px]">Agenda</span>
        </div>
    </footer>
    <!-- END: Navigation -->
    <!-- BEGIN: LucideInitialization -->
    <script data-purpose="icon-setup">
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
    <!-- END: LucideInitialization -->
</body>

</html>
